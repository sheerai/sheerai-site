<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SheerAI | Intel Feed</title>
<style>
body { background: #030403; color: #0F0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; }
.window { background: rgba(10,14,10,0.95); border: 2px solid #0F0; width: 100%; max-width: 1000px; box-shadow: 0 0 40px rgba(0,255,0,0.4); }
.header { background: #000; padding: 20px; border-bottom: 2px dashed #0F0; display: flex; justify-content: space-between; align-items: center; }
.header h1 { margin: 0; color: #fff; font-size: 1.5rem; text-shadow: 0 0 10px #0F0; }
.back-btn { background: rgba(0,255,0,0.2); border: 2px solid #0F0; color: #fff; padding: 10px 20px; font-weight: bold; text-decoration: none; cursor: pointer; transition: 0.3s; text-shadow: 0 0 8px #0F0; box-shadow: inset 0 0 10px rgba(0,255,0,0.2); }
.back-btn:hover { background: #0F0; color: #000; box-shadow: 0 0 20px #0F0; text-shadow: none; }
.content { padding: 40px; }
.news-item { border-left: 4px solid #a200ff; padding-left: 20px; margin-bottom: 30px; background: rgba(162,0,255,0.1); padding: 20px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
.news-item:hover { transform: translateX(10px); border-left-color: #0F0; background: rgba(0,255,0,0.1); box-shadow: 0 5px 20px rgba(0,255,0,0.3); }
.title { color: #fff; font-size: 1.5rem; margin: 0 0 10px 0; text-shadow: 0 0 8px #a200ff; }
.date { color: #0F0; font-weight: bold; }
.link { color: #0F0; text-decoration: none; font-weight: 900; margin-top: 10px; display: inline-block; }
</style>
</head>
<body>
<div class="window">
    <div class="header">
        <h1>~/network/hackernews_feed</h1>
        <a href="index.html" class="back-btn">[ RETURN TO HUB ]</a>
    </div>
    <div class="content" id="feed">
        <h2 style="text-align:center; color:#0F0; animation: pulse 1s infinite alternate;">[ FETCHING SECURE DATALINK... ]</h2>
    </div>
</div>
<script>
async function fetchNews() {
    const container = document.getElementById('feed');
    try {
        const response = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
        const ids = await response.json();
        let html = '';
        for (let i = 0; i < 10; i++) {
            const res = await fetch(`https://hacker-news.firebaseio.com/v0/item/${ids[i]}.json`);
            const story = await res.json();
            html += `<div class="news-item"><h3 class="title">${story.title}</h3><span class="date">SCORE: ${story.score}</span><br><a href="${story.url}" target="_blank" class="link">ACCESS_DATALINK ></a></div>`;
        }
        container.innerHTML = html;
    } catch (e) { container.innerHTML = '<h2 style="color:red; text-align:center;">[ ERROR FETCHING INTEL ]</h2>'; }
}
fetchNews();
</script>
</body>
</html>
